<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ejemplo 2</title>
    <script src ="https://code.jquery.com/jquery-4.0.0.js"></script>
    <script language = "javascript">
        $(document).ready(function() {
            var text = "mundo!";

            $("#miBoton").click(function() {
                if (text === "mundo!") {
                    text = "jQuery!";
                } else {
                    text = "mundo!";
                }
                $("#miSpan").html(text);
                $("#root").append("<p>Nuevo parrafo</p>");
            });
        });
    </script>
</head>
<body>

    Hola <span id="miSpan">mundo!</span>
    <br/>
    <button id="miBoton">Click</button>
    <br/>
    <div id="root">
        MI ROOT
    </div>
    
</body>
</html>
